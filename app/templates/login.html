{% extends 'base.html' %}

{% block content %}
<div class="container my-4">
    <div class="row">
        <div class="col-lg-5 col-md-8 mx-auto mt-4">
            <div class="glass-panel p-4 mb-4">
                <div class="text-center mb-4">
                    <i class="bi bi-shield-lock text-warning" style="font-size: 3rem;"></i>
                    <h3 class="text-white mt-2">{{ _('Portal Staff Login') }}</h3>
                    <p class="text-secondary small">{{ _('Access Admin and HR dashboards.') }}</p>
                </div>
                
                <form method="POST" action="{{ url_for('auth.login') }}">
                    <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
                    
                    <div class="mb-3">
                        <label class="form-label text-white small fw-bold">{{ _('Username') }}</label>
                        <div class="input-group">
                            <span class="input-group-text bg-primary border-secondary text-secondary"><i class="bi bi-person"></i></span>
                            <input type="text" name="username" class="form-control form-control-custom text-white" required placeholder="{{ _('Enter username') }}" autofocus>
                        </div>
                    </div>
                    
                    <div class="mb-3">
                        <label class="form-label text-white small fw-bold">{{ _('Password') }}</label>
                        <div class="input-group">
                            <span class="input-group-text bg-primary border-secondary text-secondary"><i class="bi bi-key"></i></span>
                            <input type="password" name="password" class="form-control form-control-custom text-white" required placeholder="{{ _('Enter password') }}">
                        </div>
                    </div>
                    
                    <div class="mb-4 form-check">
                        <input type="checkbox" name="remember" class="form-check-input bg-dark border-secondary" id="rememberMe">
                        <label class="form-check-label text-secondary small" for="rememberMe">{{ _('Remember me on this device') }}</label>
                    </div>
                    
                    <div>
                        <button type="submit" class="btn btn-custom-primary w-100 py-2 justify-content-center">
                            <i class="bi bi-box-arrow-in-right me-2"></i>{{ _('Secure Login') }}
                        </button>
                    </div>
                </form>
                

            </div>
        </div>
    </div>
</div>
{% endblock %}
